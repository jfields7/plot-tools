name: Python Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        cd ${{ github.workspace }}
        pip install pytest .
        cd ${{ github.workspace }}/tests
        echo "Running tests..."
        for t in *.py; do
          python3 -m pytest $t
        done
